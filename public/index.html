<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat InterPRO Team Colaborativo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN ── */
    #loginScreen {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2rem;
      width: min(380px, 92vw);
      text-align: center;
      box-shadow: 0 8px 32px #0008;
    }
    #loginScreen h1 { font-size: 1.4rem; margin-bottom: 1.2rem; color: #e94560; }
    #loginScreen input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #0f3460; background: #0f3460; color: #eee;
      font-size: 1rem; margin-bottom: 1rem; outline: none;
    }
    #loginScreen input:focus { border-color: #e94560; }

    .icon-row { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.2rem; }
    .avatar-opt {
      cursor: pointer; font-size: 2.6rem; border-radius: 50%;
      padding: 6px; border: 3px solid transparent; transition: border-color .2s, transform .2s;
      user-select: none;
    }
    .avatar-opt:hover { transform: scale(1.1); }
    .avatar-opt.selected { border-color: #e94560; }

    #joinBtn {
      width: 100%; padding: 11px; background: #e94560; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    #joinBtn:hover { background: #c73652; }

    /* ── CHAT ── */
    #chatScreen {
      display: none;
      flex-direction: column;
      width: min(680px, 98vw);
      height: 100dvh;
      max-height: 100dvh;
    }

    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h2 { font-size: 1rem; color: #e94560; flex: 1; }
    #onlineCount {
      font-size: .8rem; color: #aaa;
      background: #0f3460; padding: 3px 10px; border-radius: 20px;
    }
    #myBadge { font-size: .85rem; }

    #messages {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 8px;
      background: #1a1a2e;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }

    .msg { max-width: 78%; }
    .msg.own { align-self: flex-end; text-align: right; }
    .msg.other { align-self: flex-start; }
    .msg.system { align-self: center; text-align: center; max-width: 100%; }

    .bubble {
      display: inline-block; padding: 8px 13px; border-radius: 14px;
      font-size: .92rem; line-height: 1.45;
    }
    .msg.own .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
    .msg.other .bubble { background: #16213e; color: #ddd; border-bottom-left-radius: 4px; }
    .msg.system .bubble { background: transparent; color: #888; font-size: .8rem; }

    .meta {
      font-size: .72rem; color: #888; margin-top: 3px;
      display: flex; gap: 6px; align-items: center;
    }
    .msg.own .meta { justify-content: flex-end; }

    /* ── INPUT ── */
    #inputRow {
      display: flex; gap: 8px; padding: 10px 12px;
      background: #16213e; border-top: 1px solid #0f3460;
    }
    #msgInput {
      flex: 1; padding: 10px 14px; border-radius: 24px;
      border: 1px solid #0f3460; background: #0f3460; color: #eee;
      font-size: .95rem; outline: none;
    }
    #msgInput:focus { border-color: #e94560; }
    #sendBtn {
      padding: 10px 20px; background: #e94560; color: #fff;
      border: none; border-radius: 24px; font-weight: 600;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    #sendBtn:hover { background: #c73652; }
    #sendBtn:disabled { background: #555; cursor: default; }

    /* ── STATUS ── */
    #statusBar {
      font-size: .72rem; text-align: center;
      padding: 3px; color: #888; background: #1a1a2e;
    }
    #statusBar.error { color: #e94560; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>💬 InterPRO Team Chat</h1>
  <input type="text" id="nicknameInput" placeholder="Tu nickname" maxlength="24" />
  <div class="icon-row">
    <span class="avatar-opt" data-icon="🧑" onclick="selectIcon(this)">🧑</span>
    <span class="avatar-opt" data-icon="👩" onclick="selectIcon(this)">👩</span>
    <span class="avatar-opt" data-icon="🧑‍💻" onclick="selectIcon(this)">🧑‍💻</span>
    <span class="avatar-opt" data-icon="🤖" onclick="selectIcon(this)">🤖</span>
  </div>
  <button id="joinBtn" onclick="joinChat()">Entrar al chat</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <header>
    <h2>💬 InterPRO Team Chat</h2>
    <span id="myBadge"></span>
    <span id="onlineCount">● 0 online</span>
  </header>
  <div id="statusBar">Conectando…</div>
  <div id="messages"></div>
  <div id="inputRow">
    <input type="text" id="msgInput" placeholder="Escribe un mensaje…" maxlength="500" disabled />
    <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
  </div>
</div>

<script>
  let socket, nickname = '', icon = '';

  function selectIcon(el) {
    document.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    icon = el.dataset.icon;
  }

  function joinChat() {
    nickname = document.getElementById('nicknameInput').value.trim();
    if (!nickname) return alert('Por favor ingresa un nickname.');
    if (!icon) return alert('Por favor selecciona un avatar.');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'flex';
    document.getElementById('myBadge').textContent = icon + ' ' + nickname;
    connectWebSocket();
  }

  function connectWebSocket() {
    // Detecta automáticamente la URL del servidor (mismo host, protocolo ws/wss)
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}`;
    socket = new WebSocket(url);

    socket.onopen = () => {
      setStatus('Conectado ✓', false);
      socket.send(JSON.stringify({ type: 'join', nickname, icon }));
      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('msgInput').focus();
    };

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      renderMessage(msg);
    };

    socket.onclose = () => {
      setStatus('Desconectado — recargando en 3 s…', true);
      document.getElementById('msgInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      setTimeout(connectWebSocket, 3000);
    };

    socket.onerror = () => setStatus('Error de conexión', true);
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ type: 'message', text }));
    input.value = '';
    input.focus();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginScreen').style.display !== 'none') joinChat();
      else sendMessage();
    }
  });

  function renderMessage(msg) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.classList.add('msg');

    if (msg.type === 'system') {
      div.classList.add('system');
      div.innerHTML = `<span class="bubble">${msg.text}</span>`;
      if (msg.count !== undefined) {
        document.getElementById('onlineCount').textContent = `● ${msg.count} online`;
      }
    } else {
      const isOwn = msg.nickname === nickname;
      div.classList.add(isOwn ? 'own' : 'other');
      div.innerHTML = `
        <div class="bubble">${msg.icon ? msg.icon + ' ' : ''}<strong>${msg.nickname}</strong>: ${msg.text}</div>
        <div class="meta">${msg.time}</div>`;
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function setStatus(text, isError) {
    const bar = document.getElementById('statusBar');
    bar.textContent = text;
    bar.className = isError ? 'error' : '';
  }
</script>
</body>
</html>
