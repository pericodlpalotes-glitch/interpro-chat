<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat InterPRO Team</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e; --surface:#16213e; --border:#0f3460;
  --accent:#e94560; --accent2:#c73652;
  --text:#eee; --muted:#999; --own-bubble:#e94560;
  --other-bubble:#1e2d4a; --reply-bg:#0d1f35;
  --admin-color:#f9a825; --super-color:#00e5ff;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center}

.screen{display:none;width:100%;height:100%}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{flex-direction:column;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:min(380px,92vw);text-align:center;box-shadow:0 8px 32px #0009}
.login-box h1{font-size:1.4rem;margin-bottom:1.4rem;color:var(--accent)}
.login-box input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--border);color:var(--text);font-size:1rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:var(--accent)}
.avatar-row{display:flex;justify-content:center;gap:1.2rem;margin-bottom:1.2rem}
.av{font-size:2.4rem;cursor:pointer;border-radius:50%;padding:6px;border:3px solid transparent;transition:.2s;user-select:none}
.av:hover{transform:scale(1.1)}
.av.sel{border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{background:#555;cursor:default}

/* WAITING */
#waitingScreen{flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem}
#waitingScreen h2{color:var(--accent);font-size:1.3rem}
#waitingScreen p{color:var(--muted);max-width:300px;line-height:1.6}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#cancelWait{margin-top:.5rem;background:none;border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.2s}
#cancelWait:hover{border-color:var(--accent);color:var(--text)}

/* CHAT */
#chatScreen{flex-direction:column;width:min(900px,100vw);height:100dvh;max-height:100dvh;position:relative}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
header h2{font-size:1rem;color:var(--accent);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#myBadge{font-size:.82rem;white-space:nowrap}

.hdr-btn{background:var(--border);border:none;color:var(--text);padding:5px 11px;border-radius:20px;cursor:pointer;font-size:.8rem;white-space:nowrap;transition:.2s}
.hdr-btn:hover{background:var(--accent);color:#fff}
#leaveBtn{background:#3a1a1a;color:#ff6b6b}
#leaveBtn:hover{background:var(--accent);color:#fff}

#statusBar{font-size:.72rem;text-align:center;padding:3px;color:var(--muted);background:var(--bg);flex-shrink:0}
#statusBar.err{color:var(--accent)}

#mainArea{display:flex;flex:1;overflow:hidden}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* User panel */
#userPanel{width:220px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:width .25s}
#userPanel.hidden{width:0;overflow:hidden}
#userPanel h3{font-size:.75rem;text-transform:uppercase;color:var(--muted);padding:10px 12px 6px;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.panel-label{font-size:.68rem;color:var(--muted);padding:6px 12px 2px;text-transform:uppercase;letter-spacing:.04em}
.user-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;margin:2px 5px}
.user-row:hover{background:var(--border)}
.user-av{font-size:1.2rem;flex-shrink:0}
.user-name{font-size:.82rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-super{font-size:.6rem;background:var(--super-color);color:#000;border-radius:4px;padding:1px 5px;font-weight:700}
.badge-admin{font-size:.6rem;background:var(--admin-color);color:#000;border-radius:4px;padding:1px 5px;font-weight:700}
.admin-actions{display:flex;gap:3px;flex-shrink:0}
.btn-admit{border:none;background:#2e7d32;color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:.68rem}
.btn-admit:hover{background:#388e3c}
.btn-reject,.btn-kick{border:none;background:#b71c1c;color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:.68rem}
.btn-reject:hover,.btn-kick:hover{background:#c62828}
.btn-demote{border:none;background:#5d4037;color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:.68rem}
.btn-demote:hover{background:#795548}
.pending-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--reply-bg);border-radius:6px;margin:3px 5px}
.pending-name{font-size:.8rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Messages */
.msg{max-width:76%;display:flex;flex-direction:column}
.msg.own{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:100%;align-items:center}

.reply-quote{background:var(--reply-bg);border-left:3px solid var(--accent);border-radius:6px 6px 0 0;padding:5px 10px;font-size:.78rem;max-width:100%;cursor:pointer}
.rq-author{color:var(--accent);font-weight:600;display:block;margin-bottom:2px}
.rq-text{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:260px}

.bubble{display:inline-block;padding:8px 12px;border-radius:14px;font-size:.92rem;line-height:1.5;word-break:break-word;cursor:pointer;transition:filter .15s;position:relative}
.bubble:hover{filter:brightness(1.1)}
.msg.own .bubble{background:var(--own-bubble);color:#fff;border-bottom-right-radius:4px}
.msg.other .bubble{background:var(--other-bubble);color:var(--text);border-bottom-left-radius:4px}
.msg.system .bubble{background:transparent;color:var(--muted);font-size:.78rem;cursor:default}
.msg.system .bubble:hover{filter:none}

.bubble::after{content:'↩';position:absolute;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--muted);opacity:0;transition:opacity .15s;pointer-events:none}
.msg.own .bubble::after{right:100%;margin-right:6px}
.msg.other .bubble::after{left:100%;margin-left:6px}
.bubble:hover::after{opacity:1}
.msg.system .bubble::after{display:none}

.meta{font-size:.7rem;color:var(--muted);margin-top:3px;padding:0 2px}
.msg-sender{font-size:.72rem;color:var(--muted);margin-bottom:2px;padding:0 2px}
.bubble-wrap{display:flex;flex-direction:column;max-width:100%}

/* Reply bar */
#replyBar{display:none;flex-shrink:0;background:var(--reply-bg);border-top:1px solid var(--border);padding:6px 12px;align-items:center;gap:10px}
#replyBar.visible{display:flex}
#replyBarContent{flex:1;min-width:0}
#replyBarAuthor{font-size:.75rem;color:var(--accent);font-weight:600}
#replyBarText{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:400px}
#cancelReply{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1}
#cancelReply:hover{color:var(--text)}

/* Input row */
#inputRow{display:flex;gap:8px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
#msgInput{flex:1;padding:10px 14px;border-radius:24px;border:1px solid var(--border);background:var(--border);color:var(--text);font-size:.95rem;outline:none}
#msgInput:focus{border-color:var(--accent)}
#msgInput:disabled{opacity:.4}
#sendBtn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
#sendBtn:hover{background:var(--accent2)}
#sendBtn:disabled{background:#555;cursor:default}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center}
#overlay.visible{display:flex}
.overlay-box{background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:2rem;text-align:center;max-width:320px}
.overlay-box h2{color:var(--accent);margin-bottom:.8rem}
.overlay-box p{color:var(--muted);line-height:1.6;margin-bottom:1.2rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <h1>💬 InterPRO Team Chat</h1>
    <input id="nicknameInput" type="text" placeholder="Tu nickname" maxlength="24"/>
    <div class="avatar-row">
      <span class="av" data-icon="🧑" onclick="selAv(this)">🧑</span>
      <span class="av" data-icon="👩" onclick="selAv(this)">👩</span>
      <span class="av" data-icon="🧑‍💻" onclick="selAv(this)">🧑‍💻</span>
      <span class="av" data-icon="🤖" onclick="selAv(this)">🤖</span>
    </div>
    <button class="btn-primary" onclick="joinChat()">Entrar al chat</button>
  </div>
</div>

<!-- WAITING -->
<div id="waitingScreen" class="screen">
  <div class="spinner"></div>
  <h2>Sala de espera</h2>
  <p id="waitingText">Solicitud enviada. Esperando que el administrador te admita…</p>
  <button id="cancelWait" onclick="leaveChat()">Cancelar y salir</button>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <header>
    <h2>💬 InterPRO Team Chat</h2>
    <span id="myBadge"></span>
    <button class="hdr-btn" id="usersToggle" onclick="togglePanel()">👥 <span id="userCount">0</span></button>
    <button class="hdr-btn" id="leaveBtn" onclick="leaveChat()">🚪 Salir</button>
  </header>
  <div id="statusBar">Conectando…</div>

  <div id="mainArea">
    <div id="messages"></div>

    <div id="userPanel">
      <h3>Usuarios</h3>
      <div id="pendingSection" style="display:none">
        <div class="panel-label" style="color:#f9a825">⏳ En espera</div>
        <div id="pendingList"></div>
        <div class="panel-label" style="margin-top:6px">✅ Conectados</div>
      </div>
      <div id="userList"></div>
    </div>
  </div>

  <div id="replyBar">
    <div id="replyBarContent">
      <span id="replyBarAuthor"></span>
      <span id="replyBarText"></span>
    </div>
    <button id="cancelReply" onclick="clearReply()" title="Cancelar respuesta">✕</button>
  </div>

  <div id="inputRow">
    <input id="msgInput" type="text" placeholder="Escribe un mensaje…" maxlength="500" disabled/>
    <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
  </div>
</div>

<!-- OVERLAY (expulsado / rechazado / salida voluntaria) -->
<div id="overlay">
  <div class="overlay-box">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="btn-primary" onclick="location.reload()">Volver al inicio</button>
  </div>
</div>

<script>
/* ── ESTADO GLOBAL ── */
let socket;
let nickname = '', icon = '';
let isSuperAdmin = false; // Ruperto
let isAdmin      = false; // promovido por código
let replyingTo   = null;
let panelOpen    = true;
let intentionalLeave = false;

/* ── FIX #2: formatear hora con la zona horaria del CLIENTE ── */
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

/* ── HELPERS ── */
const $ = id => document.getElementById(id);
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
function setStatus(txt, err = false) {
  $('statusBar').textContent = txt;
  $('statusBar').className = err ? 'err' : '';
}

/* ── LOGIN ── */
function selAv(el) {
  document.querySelectorAll('.av').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  icon = el.dataset.icon;
}
function joinChat() {
  nickname = $('nicknameInput').value.trim();
  if (!nickname) return alert('Por favor ingresa un nickname.');
  if (!icon)     return alert('Por favor selecciona un avatar.');
  showScreen('chatScreen');
  $('myBadge').textContent = icon + ' ' + nickname;
  connectWS();
}

/* ── FIX #5: SALIR VOLUNTARIAMENTE ── */
function leaveChat() {
  intentionalLeave = true;
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: 'leave' }));
  }
  showOverlay('Has salido del chat', 'Puedes volver a entrar con otro nombre de usuario.');
}

/* ── WEBSOCKET ── */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  socket = new WebSocket(`${proto}://${location.host}`);

  socket.onopen = () => {
    setStatus('Conectando…');
    socket.send(JSON.stringify({ type: 'join', nickname, icon }));
  };

  socket.onmessage = e => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'admitted':
        setStatus('Conectado ✓');
        showScreen('chatScreen');
        $('msgInput').disabled = false;
        $('sendBtn').disabled  = false;
        $('msgInput').focus();
        break;
      case 'waiting':
        showScreen('waitingScreen');
        $('waitingText').textContent = msg.text;
        break;
      case 'left':
        // confirmación del servidor de salida voluntaria — ya mostramos overlay
        break;
      case 'rejected':
        showOverlay('Acceso denegado', msg.text);
        break;
      case 'kicked':
        showOverlay('Has sido expulsado', msg.text);
        break;
      case 'system':
        addSystem(msg.text, msg.ts);
        break;
      case 'message':
        addMessage(msg);
        break;
      case 'user_list':
        // Actualizamos nuestro rol si cambia (p. ej. promovidos a admin)
        isSuperAdmin = msg.isSuperAdmin;
        isAdmin = msg.users.find(u => u.nickname === nickname)?.isAdmin || false;
        renderUserList(msg.users, msg.pending, msg.count);
        break;
    }
  };

  socket.onclose = () => {
    if (intentionalLeave) return; // salida voluntaria, no reconectar
    if ($('overlay').classList.contains('visible')) return; // expulsado
    setStatus('Desconectado — reconectando en 3 s…', true);
    $('msgInput').disabled = true;
    $('sendBtn').disabled  = true;
    setTimeout(connectWS, 3000);
  };

  socket.onerror = () => setStatus('Error de conexión', true);
}

/* ── MENSAJES ── */
function addSystem(html, ts) {
  const box = $('messages');
  const d   = document.createElement('div');
  d.className = 'msg system';
  // FIX #2: usamos fmtTime si hay ts, sino dejamos sin hora
  const timeStr = ts ? ` <span style="opacity:.5;font-size:.7em">${fmtTime(ts)}</span>` : '';
  d.innerHTML = `<div class="bubble">${html}${timeStr}</div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function addMessage(msg) {
  const box  = $('messages');
  const isMe = msg.nickname === nickname;
  const d    = document.createElement('div');
  d.className = `msg ${isMe ? 'own' : 'other'}`;
  d.dataset.id       = msg.id;
  d.dataset.nickname = msg.nickname;
  d.dataset.text     = msg.text.replace(/<[^>]*>/g, '');

  let replyHtml = '';
  if (msg.replyTo) {
    replyHtml = `
      <div class="reply-quote" onclick="scrollToMsg('${msg.replyTo.id}')">
        <span class="rq-author">↩ ${msg.replyTo.nickname}</span>
        <span class="rq-text">${msg.replyTo.text}</span>
      </div>`;
  }

  const senderHtml = !isMe
    ? `<div class="msg-sender">${msg.icon} ${msg.nickname}</div>`
    : '';

  // FIX #2: hora formateada con zona horaria del cliente
  const timeStr = msg.ts ? fmtTime(msg.ts) : '';

  d.innerHTML = `
    ${senderHtml}
    <div class="bubble-wrap">
      ${replyHtml}
      <div class="bubble" onclick="setReply('${msg.id}','${esc(msg.nickname)}','${esc(d.dataset.text)}')">${msg.text}</div>
    </div>
    <div class="meta">${timeStr}</div>`;

  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function scrollToMsg(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const b = el.querySelector('.bubble');
  b.style.outline = '2px solid var(--accent)';
  setTimeout(() => b.style.outline = '', 1400);
}

function esc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

/* ── REPLY ── */
function setReply(id, nick, text) {
  replyingTo = { id, nickname: nick, text };
  $('replyBar').classList.add('visible');
  $('replyBarAuthor').textContent = '↩ ' + nick;
  $('replyBarText').textContent   = text.length > 80 ? text.slice(0, 80) + '…' : text;
  $('msgInput').focus();
}
function clearReply() {
  replyingTo = null;
  $('replyBar').classList.remove('visible');
}

/* ── SEND ── */
function sendMessage() {
  const input = $('msgInput');
  const text  = input.value.trim();
  if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify({ type: 'message', text, replyTo: replyingTo }));
  input.value = '';
  clearReply();
  input.focus();
}

/* ── PANEL DE USUARIOS ── */
function togglePanel() {
  panelOpen = !panelOpen;
  $('userPanel').classList.toggle('hidden', !panelOpen);
}

function renderUserList(users, pending, count) {
  $('userCount').textContent = count || users.length;

  // Sección de pendientes (solo admins)
  const pendSec  = $('pendingSection');
  const pendList = $('pendingList');
  const amAdmin  = isSuperAdmin || isAdmin;

  if (amAdmin && pending && pending.length > 0) {
    pendSec.style.display = 'block';
    pendList.innerHTML = pending.map(u => `
      <div class="pending-row">
        <span>${u.icon}</span>
        <span class="pending-name">${u.nickname}</span>
        <div class="admin-actions">
          <button class="btn-admit" onclick="adminAction('admit','${u.id}')">✓</button>
          <button class="btn-reject" onclick="adminAction('reject','${u.id}')">✗</button>
        </div>
      </div>`).join('');
  } else {
    pendSec.style.display = 'none';
    pendList.innerHTML = '';
  }

  // Lista de conectados
  $('userList').innerHTML = users.map(u => {
    const isMe = u.nickname === nickname;

    // Badges
    let badge = '';
    if (u.isSuperAdmin) badge = '<span class="badge-super">SUPER</span>';
    else if (u.isAdmin) badge = '<span class="badge-admin">ADMIN</span>';

    // Botones de acción (solo visibles para admins sobre otros usuarios)
    let actions = '';
    if (!isMe) {
      if (isSuperAdmin) {
        // Ruperto puede: expulsar a no-superAdmin, degradar a admins normales
        if (!u.isSuperAdmin) {
          actions += `<button class="btn-kick" onclick="adminAction('kick','${u.id}')" title="Expulsar">✕</button>`;
        }
        if (u.isAdmin && !u.isSuperAdmin) {
          actions += `<button class="btn-demote" onclick="adminAction('demote','${u.id}')" title="Quitar admin">↓</button>`;
        }
      } else if (isAdmin) {
        // Admin normal solo puede expulsar a usuarios normales (no admins)
        if (!u.isAdmin && !u.isSuperAdmin) {
          actions += `<button class="btn-kick" onclick="adminAction('kick','${u.id}')" title="Expulsar">✕</button>`;
        }
      }
    }

    return `
      <div class="user-row">
        <span class="user-av">${u.icon}</span>
        <span class="user-name">${u.nickname} ${badge}</span>
        ${actions ? `<div class="admin-actions">${actions}</div>` : ''}
      </div>`;
  }).join('');
}

/* ── ACCIONES DE ADMIN ── */
function adminAction(type, id) {
  if (!socket || socket.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify({ type, id }));
}

/* ── OVERLAY ── */
function showOverlay(title, text) {
  $('overlayTitle').textContent = title;
  $('overlayText').textContent  = text;
  $('overlay').classList.add('visible');
}

/* ── TECLADO ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if ($('loginScreen').classList.contains('active')) joinChat();
  else sendMessage();
});
</script>
</body>
</html>
